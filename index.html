<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#131722;--panel:#1e222d;--border:#2a2f3e;
  --dim:#555c6e;--muted:#868993;--mid:#9ba3b2;--bright:#d1d4dc;--full:#fff;
  --up:#e22b2b;--dn:#1763b2;--flat:#2a2e39;
  --ac:#2962ff;
  --f:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
  --m:'SF Mono','Fira Code','Consolas','Courier New',monospace;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--f);background:var(--bg);color:var(--bright);display:flex;flex-direction:column;height:100vh;height:100dvh;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}

/* 터치 스크롤 방지 */
canvas{display:block;touch-action:none}

/* ── 모바일 반응형 (600px 이하) ── */
@media(max-width:600px){
  .topbar{height:40px}
  .t-brand{padding:0 10px;gap:7px}
  .t-title{display:none}
  .t-idx{padding:0 10px}
  .t-val{font-size:11px}
  .t-chg{font-size:9px;padding:1px 4px}
  .t-status{padding:0 10px}
  .stxt{display:none}
  .fbar{height:30px;padding:0 8px}
  .f-lbl{display:none}
  .chip{padding:2px 7px;font-size:10px}
  .lgbar{width:50px}
  .btm{height:20px;padding:0 10px;font-size:8px}
  /* 툴팁: 화면 하단 고정 */
  .tt{
    position:fixed!important;
    left:8px!important;right:8px!important;
    bottom:24px!important;top:auto!important;
    max-width:none!important;min-width:0!important;
    width:calc(100% - 16px);
    border-radius:12px;
  }
}
/* 아주 좁은 화면 (380px 이하): KOSDAQ 숨김 */
@media(max-width:380px){
  .t-indices .t-idx:last-child{display:none}
}

.topbar{display:flex;align-items:center;height:46px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
.t-brand{display:flex;align-items:center;gap:10px;padding:0 20px;height:100%;border-right:1px solid var(--border);flex-shrink:0}
.t-pill{height:22px;padding:0 9px;border-radius:4px;background:var(--ac);font-size:10px;font-weight:700;color:#fff;letter-spacing:.06em;display:flex;align-items:center}
.t-title{font-size:12px;font-weight:600;color:var(--bright);letter-spacing:.04em}
.t-title span{color:var(--muted);font-weight:400}
.t-indices{display:flex;align-items:stretch;height:100%}
.t-idx{display:flex;flex-direction:column;justify-content:center;padding:0 18px;border-right:1px solid var(--border);gap:2px;flex-shrink:0}
.t-lbl{font-size:9px;font-weight:500;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}
.t-row{display:flex;align-items:baseline;gap:6px}
.t-val{font-family:var(--m);font-size:13px;font-weight:500;color:var(--full);font-variant-numeric:tabular-nums}
.t-chg{font-family:var(--m);font-size:10px;padding:1px 5px;border-radius:3px;font-variant-numeric:tabular-nums}
.t-chg.u{color:var(--up);background:rgba(226,43,43,.13)}
.t-chg.d{color:var(--dn);background:rgba(23,99,178,.15)}
.t-status{display:flex;align-items:center;gap:7px;padding:0 18px;margin-left:auto;flex-shrink:0}
.sdot{width:5px;height:5px;border-radius:50%;background:#26a69a;flex-shrink:0}
.sdot.live{animation:blink 2.4s ease-in-out infinite}
.sdot.err{background:var(--dn);animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.22}}
.stxt{font-size:10px;color:var(--dim)}

.fbar{display:flex;align-items:center;height:34px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none;padding:0 16px;gap:3px}
.fbar::-webkit-scrollbar{display:none}
.f-lbl{font-size:10px;font-weight:500;color:var(--dim);letter-spacing:.08em;text-transform:uppercase;margin-right:5px;flex-shrink:0}
.chip{padding:3px 10px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid transparent;color:var(--dim);background:transparent;white-space:nowrap;transition:all .12s}
.chip:hover{color:var(--mid);background:rgba(255,255,255,.05);border-color:var(--border)}
.chip.on{color:#fff;background:rgba(41,98,255,.22);border-color:rgba(41,98,255,.5)}
.f-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.lgbar{width:80px;height:4px;border-radius:2px;overflow:hidden;display:flex}
.lgs{flex:1}
.lgt{font-size:9px;font-weight:500;color:var(--dim);white-space:nowrap;font-family:var(--m)}

.outer{flex:1;min-height:0;position:relative;background:var(--bg)}
canvas{display:block}

.lov{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:10}
.lring{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--ac);animation:spin .8s cubic-bezier(.5,.1,.5,.9) infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:12px;font-weight:500;color:var(--mid)}
.lsub{font-size:10px;color:var(--dim)}

.tt{position:fixed;background:rgba(30,34,45,.97);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:14px 16px 12px;pointer-events:none;display:none;z-index:300;min-width:220px;max-width:260px;box-shadow:0 4px 6px rgba(0,0,0,.3),0 12px 32px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04);backdrop-filter:blur(16px)}
.tt-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.07)}
.tt-ticker{font-size:16px;font-weight:700;color:var(--full);letter-spacing:-.02em}
.tt-name{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.3}
.tt-badge{font-family:var(--m);font-size:12px;font-weight:500;padding:3px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0;font-variant-numeric:tabular-nums}
.tt-badge.u{color:var(--up);background:rgba(226,43,43,.13)}
.tt-badge.d{color:var(--dn);background:rgba(23,99,178,.15)}
.tt-rows{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.tt-row{display:flex;justify-content:space-between;align-items:center;gap:12px}
.tt-rl{font-size:10px;color:var(--dim)}
.tt-rv{font-family:var(--m);font-size:11px;color:var(--mid);font-variant-numeric:tabular-nums}
.tt-rv.u{color:var(--up)}.tt-rv.d{color:var(--dn)}
.tt-spark{margin-top:10px;padding-top:9px;border-top:1px solid rgba(255,255,255,.07)}

.btm{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:24px;background:var(--panel);border-top:1px solid var(--border);flex-shrink:0;font-size:9px;color:var(--dim);font-family:var(--m)}

/* ── 에러 방어막 ── */
window.onerror=function(msg,src,line){
  var lov=document.getElementById("lov");
  if(lov) lov.style.display="flex";
  var ltxt=document.getElementById("ltxt");
  if(ltxt) ltxt.textContent="오류 발생";
  var lsub=document.getElementById("lsub");
  if(lsub) lsub.textContent=String(msg).slice(0,80)+" ("+line+")";
  return false;
};
window.addEventListener("unhandledrejection",function(e){
  var lov=document.getElementById("lov");
  if(lov) lov.style.display="flex";
  var ltxt=document.getElementById("ltxt");
  if(ltxt) ltxt.textContent="Promise 오류";
  var lsub=document.getElementById("lsub");
  if(lsub) lsub.textContent=String(e.reason).slice(0,80);
});

/* ── AbortSignal.timeout 폴리필 ── */
if(!AbortSignal.timeout){
  AbortSignal.timeout=function(ms){
    var c=new AbortController();
    setTimeout(function(){c.abort();},ms);
    return c.signal;
  };
}

/* ── fetch에 강제 타임아웃 래퍼 ── */
function fetchT(url,opts,ms){
  return fetch(url,Object.assign({signal:AbortSignal.timeout(ms||8000)},opts||{}));
}

/* ── Canvas roundRect 폴리필 (iOS 15 이하 Safari) ── */
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r||0,w/2,h/2);
    this.beginPath();
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);
    this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);
    this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);
    this.closePath();return this;
  };
}

/* ════════════════════════════════
   DATA FETCH
   전략: Yahoo Finance를 3개 프록시로 순차 시도
   1) corsproxy.io  — 가장 안정적
   2) allorigins.win
   3) 직접 호출 (운 좋으면 CORS 없이 통과)
════════════════════════════════ */

// ★ Cloudflare Worker URL 설정 (있으면 최우선 사용)
// proxy-worker.js를 Cloudflare Workers에 배포한 후 아래에 입력:
// 예: const CF_WORKER = "https://kospi-proxy.유저명.workers.dev";
const CF_WORKER = "https://wispy-wood-3ca4.okpika2006.workers.dev";

let PD={},nextAt=0,REFRESH=3*60*1000; // 3분마다 갱신
const TICKERS=SECTORS.flatMap(s=>s.stocks.map(st=>st.c+".KS"));

function setIdx(vId,bId,val,chg){
  document.getElementById(vId).textContent=val.toLocaleString("ko-KR");
  const el=document.getElementById(bId);
  el.textContent=(chg>=0?"+":"")+chg.toFixed(2)+"%";
  el.className="t-chg "+(chg>=0?"u":"d");
}

/* Yahoo Finance URL (한 번에 전체 종목) */
function yahooUrl(tickers){
  return `https://query2.finance.yahoo.com/v7/finance/quote?symbols=${tickers.join(",")}&fields=regularMarketChangePercent,regularMarketPrice,regularMarketPreviousClose&formatted=false&lang=ko-KR`;
}

/* 프록시 0: Cloudflare Worker (설정된 경우 최우선) */
async function tryWorker(tickers){
  if(!CF_WORKER) throw new Error("worker not configured");
  const url=`${CF_WORKER}/quote?symbols=${tickers.join(",")}`;
  const res=await fetchT(url,{},8000);
  if(!res.ok) throw new Error("worker "+res.status);
  const json=await res.json();
  const rows=json?.quoteResponse?.result??[];
  if(!rows.length) throw new Error("empty");
  return rows;
}

/* 프록시 1: corsproxy.io — ?url= 방식 */
async function tryCorsproxy(tickers){
  const target=yahooUrl(tickers);
  const url=`https://corsproxy.io/?url=${encodeURIComponent(target)}`;
  const res=await fetchT(url,{headers:{"x-requested-with":"XMLHttpRequest"}},10000);
  if(!res.ok) throw new Error("corsproxy "+res.status);
  const json=await res.json();
  const rows=json?.quoteResponse?.result??[];

async function loadIdx(sym,vId,bId,fv,fc){
  const target=`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=1d`;
  const urls=[];
  if(CF_WORKER) urls.push(`${CF_WORKER}/chart?symbol=${sym}`);
  urls.push(
    `https://corsproxy.io/?url=${encodeURIComponent(target)}`,
    `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`,
  );
  for(const url of urls){
    try{
      const r=await fetchT(url,{},6000);
      if(!r.ok) continue;
      const body=await r.json();
      const parsed = body.contents ? JSON.parse(body.contents) : body;
      const m=parsed?.chart?.result?.[0]?.meta;
      if(m && m.regularMarketPrice){
        const chg=((m.regularMarketPrice-m.chartPreviousClose)/m.chartPreviousClose)*100;
        setIdx(vId,bId,m.regularMarketPrice,chg);
        return;
      }
    }catch(e){}
  }
  if(fv) setIdx(vId,bId,fv,fc);
}

/* ════════════════════════════════
   COLOR
════════════════════════════════ */
function tileColor(chg,hover){
  const abs=Math.abs(chg);
  const L=(a,b,t)=>Math.round(a+(b-a)*t);
  let r,g,b;
  if(abs<0.05){
    // 보합: #2a2e39
    r=0x2a;g=0x2e;b=0x39;
  } else {
    // v: 0 = 약한 변동, 1 = 강한 변동 (5% 기준)
    const v=Math.min(abs/5,1);
    if(chg>0){
      // 상승: 약할수록 밝은 빨강(#ff6b6b) → 강할수록 어두운 암적색(#3a0000)
      // v=0: #ff8080  v=0.4: #e22b2b  v=0.7: #8b1a1a  v=1: #3a0000
      if(v<0.4){const t=v/0.4;      r=L(0xff,0xe2,t); g=L(0x80,0x2b,t); b=L(0x80,0x2b,t);}
      else if(v<0.7){const t=(v-0.4)/0.3; r=L(0xe2,0x8b,t); g=L(0x2b,0x1a,t); b=L(0x2b,0x1a,t);}
      else{const t=(v-0.7)/0.3;           r=L(0x8b,0x3a,t); g=L(0x1a,0x00,t); b=L(0x1a,0x00,t);}
    } else {
      // 하락: 약할수록 밝은 파랑(#6699e8) → 강할수록 어두운 남색(#050f28)
      // v=0: #80aaf0  v=0.4: #1763b2  v=0.7: #0d3d7a  v=1: #050f28
      if(v<0.4){const t=v/0.4;      r=L(0x80,0x17,t); g=L(0xaa,0x63,t); b=L(0xf0,0xb2,t);}
      else if(v<0.7){const t=(v-0.4)/0.3; r=L(0x17,0x0d,t); g=L(0x63,0x3d,t); b=L(0xb2,0x7a,t);}
      else{const t=(v-0.7)/0.3;           r=L(0x0d,0x05,t); g=L(0x3d,0x0f,t); b=L(0x7a,0x28,t);}
    }
  }
  // 호버: 15% 밝게
  if(hover){r=Math.min(255,Math.round(r+38));g=Math.min(255,Math.round(g+28));b=Math.min(255,Math.round(b+28));}
  const br=Math.min(255,r+40),bg2=Math.min(255,g+30),bb2=Math.min(255,b+30);
  return{bg:`rgb(${r},${g},${b})`,border:hover?"#ffffff":`rgba(${br},${bg2},${bb2},0.25)`};
}

/* ════════════════════════════════
   ★ SQUARIFIED TREEMAP — 올바른 구현 ★

   핵심 원리:
   1. items를 cap 내림차순 정렬
   2. 현재 remaining rectangle의 짧은 쪽(short side)을 따라
      "row"를 쌓음
   3. row에 item 추가 시 worst aspect ratio가 개선되면 추가,
      악화되면 중단하고 현재 row를 확정
   4. 확정된 row는 짧은 쪽 방향으로 배치(= 타일이 긴 쪽으로 나열)
   5. 남은 영역에 재귀

   이렇게 하면 화면이 가로로 길어도 세로로도 분할되고
   항상 정사각형에 가까운 타일이 생성됨
════════════════════════════════ */
function squarify(items, x, y, w, h){
  if(!items.length) return [];

  // 면적 계산을 위한 총합
  const total = items.reduce((s,it)=>s+it.cap, 0);
  const area  = w * h;

  // items를 cap 내림차순 정렬 (원본 불변)
  const sorted = [...items].sort((a,b)=>b.cap-a.cap);

  return _squarify(sorted, x, y, w, h, total, area);
}

function _squarify(items, x, y, w, h, total, area){
  if(!items.length) return [];
  if(items.length === 1){
    return [{...items[0], x, y, w, h}];
  }

  // worst aspect ratio 계산 함수
  // row = [{cap}], shortSide = 현재 짧은 변 길이
  function worstAR(row, shortSide){
    const rowSum = row.reduce((s,it)=>s+it.cap, 0);
    // row가 차지할 면적
    const rowArea = (rowSum / total) * area;
    // row 안에서 각 item의 크기
    let worst = 0;
    for(const it of row){
      const itemArea = (it.cap / rowSum) * rowArea;
      // 이 item의 두 변: shortSide vs itemArea/shortSide
      const a = shortSide;
      const b = itemArea / shortSide;
      const ar = a > b ? a/b : b/a;
      if(ar > worst) worst = ar;
    }
    return worst;
  }

  // 짧은 변이 w인지 h인지
  const short = Math.min(w, h);

  let row = [];
  let i   = 0;

  while(i < items.length){
    const candidate = [...row, items[i]];
    if(row.length === 0 || worstAR(candidate, short) <= worstAR(row, short)){
      row = candidate;
      i++;
    } else {
      break;
    }
  }

  // row 확정 → 배치
  const rowSum   = row.reduce((s,it)=>s+it.cap, 0);
  const rowFrac  = rowSum / total;
  const result   = [];

  if(w >= h){
    // 가로가 길다 → row를 왼쪽에 세로로 쌓음 (가로 분할)
    const colW = rowFrac * w;
    let cy = y;
    for(const it of row){
      const tileH = (it.cap / rowSum) * h;
      result.push({...it, x, y:cy, w:colW, h:tileH});
      cy += tileH;
    }
    // 나머지 오른쪽 영역 재귀
    const rem = items.slice(i);
    if(rem.length && w - colW > 0){
      result.push(..._squarify(rem, x+colW, y, w-colW, h,
        total - rowSum + rem.reduce((s,it)=>s+it.cap,0) === 0 ? 1 : total,
        area));
    }
  } else {
    // 세로가 길다 → row를 위쪽에 가로로 쌓음 (세로 분할)
    const rowH = rowFrac * h;
    let cx = x;
    for(const it of row){
      const tileW = (it.cap / rowSum) * w;
      result.push({...it, x:cx, y, w:tileW, h:rowH});
      cx += tileW;
    }
    // 나머지 아래쪽 영역 재귀
    const rem = items.slice(i);
    if(rem.length && h - rowH > 0){
      result.push(..._squarify(rem, x, y+rowH, w, h-rowH,
        total,
        area));
    }
  }

  return result;
}

/* total을 재귀 시 올바르게 넘기는 버전으로 정리 */
function layoutSq(items, x, y, w, h){
  if(!items.length) return [];
  const sorted = [...items].sort((a,b)=>b.cap-a.cap);
  const total  = sorted.reduce((s,it)=>s+it.cap, 0);
  const area   = w * h;

  function recurse(its, rx, ry, rw, rh){
    if(!its.length) return [];
    if(its.length===1) return [{...its[0], x:rx, y:ry, w:rw, h:rh}];

    const tot = its.reduce((s,it)=>s+it.cap, 0);
    const short = Math.min(rw, rh);

    function worstAR(row){
      const rs = row.reduce((s,it)=>s+it.cap, 0);
      const ra = (rs/tot)*rw*rh;
      let worst=0;
      for(const it of row){
        const ia = (it.cap/rs)*ra;
        const a  = short;
        const b  = ia/short;
        const ar = a>b ? a/b : b/a;
        if(ar>worst) worst=ar;
      }
      return worst;
    }

    let row=[], i=0;
    while(i<its.length){
      const cand=[...row,its[i]];
      if(!row.length || worstAR(cand)<=worstAR(row)){row=cand;i++;}
      else break;
    }

    const rs   = row.reduce((s,it)=>s+it.cap, 0);
    const frac = rs/tot;
    const res  = [];

    if(rw>=rh){
      // 가로 분할: row를 왼쪽 열로
      const colW = frac*rw;
      let cy=ry;
      row.forEach(it=>{
        const th=(it.cap/rs)*rh;
        res.push({...it,x:rx,y:cy,w:colW,h:th});
        cy+=th;
      });
      if(i<its.length) res.push(...recurse(its.slice(i),rx+colW,ry,rw-colW,rh));
    } else {
      // 세로 분할: row를 위쪽 행으로
      const rowH=frac*rh;
      let cx=rx;
      row.forEach(it=>{
        const tw=(it.cap/rs)*rw;
        res.push({...it,x:cx,y:ry,w:tw,h:rowH});
        cx+=tw;
      });
      if(i<its.length) res.push(...recurse(its.slice(i),rx,ry+rowH,rw,rh-rowH));
    }
    return res;
  }

  return recurse(sorted, x, y, w, h);
}

/* ════════════════════════════════
   CANVAS
════════════════════════════════ */
const cv =document.getElementById("cv");
const ctx=cv.getContext("2d",{alpha:false});
const DPR=Math.min(window.devicePixelRatio||1,2);
let tiles=[],hovIdx=-1,hovProgress=0,hovRaf=null;

/* text cache */
const TC={};
function tmw(t,fs,bold){
  const k=`${t}|${fs}|${bold}`;
  if(TC[k]!==undefined)return TC[k];
  ctx.font=`${bold?"700":"400"} ${fs}px -apple-system,BlinkMacSystemFont,sans-serif`;
  return(TC[k]=ctx.measureText(t).width);
}
function fitFs(t,maxW,maxFs,bold){
  for(let f=maxFs;f>=7;f--)if(tmw(t,f,bold)<=maxW)return f;
  return 0;
}

/* layout constants */
const T_GAP=1;   // 타일 간격 (양쪽 합 2px)
const S_GAP=4;   // 섹터 간격
const S_HDR=20;  // 섹터 라벨 높이
const MIN_TILE_H=24; // 명세: 최소 타일 높이 고려

function drawTile(r, prog){
  const tx=r.x+T_GAP, ty=r.y+T_GAP;
  const tw=r.w-T_GAP*2, th=r.h-T_GAP*2;
  if(tw<2||th<2) return;

  const hov  = prog>0;
  const col  = tileColor(r.chg, false);

  // 호버 시 색상 보간 (progress 0→1)
  let bgColor = col.bg, bdColor = col.border;
  if(hov && prog>0){
    const hc=tileColor(r.chg,true);
    const bm=col.bg.match(/\d+/g).map(Number);
    const hm=hc.bg.match(/\d+/g).map(Number);
    const L=(a,b)=>Math.round(a+(b-a)*prog);
    bgColor=`rgb(${L(bm[0],hm[0])},${L(bm[1],hm[1])},${L(bm[2],hm[2])})`;
    bdColor=prog>0.5?"rgba(255,255,255,.9)":col.border;
  }

  ctx.fillStyle=bgColor;
  ctx.beginPath();
  ctx.roundRect(tx,ty,tw,th,2);
  ctx.fill();

  ctx.strokeStyle=bdColor;
  ctx.lineWidth=hov&&prog>0.5?1.5:1;
  ctx.stroke();

  if(tw<14||th<11) return;

  const pad=5,aw=tw-pad*2,cx2=tx+tw/2;
  const sign=r.chg>=0?"+":"";
  const chgT=`${sign}${r.chg.toFixed(2)}%`;
  ctx.textAlign="center";

  /* 종목명 (Bold, 비례 스케일) */
  const maxNfs=Math.min(15,tw*0.30,th*0.40);
  const nfs=fitFs(r.n,aw,maxNfs,true);
  if(nfs===0) return;

  /* 등락률 */
  const maxCfs=Math.min(nfs-1,11);
  const cfs=fitFs(chgT,aw,maxCfs,false);
  const gap=5;
  const showChg=cfs>0 && th>=nfs+gap+cfs+10;

  if(showChg){
    const block=nfs+gap+cfs;
    const ny=ty+th/2-block/2+nfs/2;
    ctx.font=`700 ${nfs}px -apple-system,BlinkMacSystemFont,sans-serif`;
    ctx.fillStyle="rgba(255,255,255,.97)";
    ctx.textBaseline="middle";
    ctx.fillText(r.n,cx2,ny);
    ctx.font=`500 ${cfs}px 'SF Mono','Consolas',monospace`;
    ctx.fillStyle="rgba(255,255,255,.65)";
    ctx.fillText(chgT,cx2,ny+nfs/2+gap+cfs/2);
  } else {
    ctx.font=`700 ${nfs}px -apple-system,BlinkMacSystemFont,sans-serif`;
    ctx.fillStyle="rgba(255,255,255,.97)";
    ctx.textBaseline="middle";
    ctx.fillText(r.n,cx2,ty+th/2);
  }
}

function draw(){
  const outer=document.getElementById("outer");
  const W=outer.offsetWidth, H=outer.offsetHeight;
  if(W<=0||H<=0) return;

  cv.style.cssText=`width:${W}px;height:${H}px`;
  cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.fillStyle="#131722";
  ctx.fillRect(0,0,W,H);

  const secs=active==="전체"?SECTORS:SECTORS.filter(s=>s.name===active);
  tiles=[];

  /* 단일 섹터: 전체 캔버스에 squarify */
  if(secs.length===1){
    const sec=secs[0];
    const items=sec.stocks.map(st=>({...st,sector:sec.name,chg:PD[st.c]?.chg??0,price:PD[st.c]?.price??0}));
    layoutSq(items,0,0,W,H).forEach(r=>{
      tiles.push(r);
      drawTile(r, tiles.length-1===hovIdx?hovProgress:0);
    });
    return;
  }

  /* 섹터 squarify — 섹터 블록도 동일 알고리즘 적용 */
  const sItems=secs.map(s=>({
    name:s.name,
    cap:s.stocks.reduce((a,st)=>a+st.cap,0),
  }));

  layoutSq(sItems,0,0,W,H).forEach(sr=>{
    const sec=secs.find(s=>s.name===sr.name);
    if(!sec) return;

    /* 섹터 블록: S_GAP 여백 */
    const bx=sr.x+S_GAP, by=sr.y+S_GAP;
    const bw=sr.w-S_GAP*2, bh=sr.h-S_GAP*2;
    if(bw<12||bh<12) return;

    /* 섹터 외곽 테두리 2px #1e222d */
    ctx.strokeStyle="#1e222d";
    ctx.lineWidth=2;
    ctx.strokeRect(bx+1,by+1,bw-2,bh-2);

    /* 섹터 라벨 배경 */
    ctx.fillStyle="rgba(30,34,45,.9)";
    ctx.fillRect(bx,by,bw,S_HDR);

    /* 섹터명 — muted grey #868993, 좌측 상단 */
    ctx.font=`500 10px -apple-system,BlinkMacSystemFont,sans-serif`;
    ctx.textAlign="left";
    ctx.textBaseline="middle";
    ctx.fillStyle="#868993";
    let lbl=sec.name;
    if(ctx.measureText(lbl+" ›").width<bw-50) lbl+=" ›";
    while(ctx.measureText(lbl).width>bw-14&&lbl.length>2) lbl=lbl.slice(0,-1)+"…";
    ctx.fillText(lbl,bx+8,by+S_HDR/2);

    /* 섹터 가중평균 등락률 우측 */
    if(bw>80){
      const tot=sec.stocks.reduce((a,st)=>a+st.cap,0);
      const wav=sec.stocks.reduce((a,st)=>a+(PD[st.c]?.chg??0)*st.cap,0)/tot;
      ctx.font=`500 9px 'SF Mono','Consolas',monospace`;
      ctx.textAlign="right";
      ctx.fillStyle=wav>=0?"rgba(226,43,43,.9)":"rgba(23,99,178,.9)";
      ctx.fillText((wav>=0?"+":"")+wav.toFixed(2)+"%",bx+bw-8,by+S_HDR/2);
    }

    /* 종목 squarify — 라벨 아래 영역 */
    const ta={x:bx, y:by+S_HDR+1, w:bw, h:bh-S_HDR-1};
    if(ta.w<6||ta.h<6) return;

    const items=sec.stocks.map(st=>({
      ...st, sector:sec.name,
      chg:PD[st.c]?.chg??0, price:PD[st.c]?.price??0,
    }));

    layoutSq(items,ta.x,ta.y,ta.w,ta.h).forEach(r=>{
      tiles.push(r);
      drawTile(r, tiles.length-1===hovIdx?hovProgress:0);
    });
  });
}

/* hover animation (0.2s = ~12frames @60fps) */
function animHover(){
  hovProgress=Math.min(1,hovProgress+0.14);
  draw();
  if(hovProgress<1) hovRaf=requestAnimationFrame(animHover);
}

/* ════════════════════════════════

const SPARK_CACHE={};

function drawSparkline(can,chg,code){
  const sc=can.getContext("2d");
  const W=can.width,H=can.height;
  sc.clearRect(0,0,W,H);

  let pts;
  if(code){
    if(!SPARK_CACHE[code]){
      // 시드 기반 고정 난수로 포인트 생성
      let s=code.split("").reduce((a,c)=>a+c.charCodeAt(0),0)*31+Math.round(chg*100);
      const rand=()=>{s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;};
      const drift=chg/40*0.6;let v=0;pts=[];
      for(let i=0;i<40;i++){v+=(rand()-.48+drift)*0.55;pts.push(v);}
      SPARK_CACHE[code]=pts;
    }
    pts=SPARK_CACHE[code];
  } else {
    const drift=chg/40*0.8;let v=0;pts=[];
    for(let i=0;i<40;i++){v+=(Math.random()-.48+drift*.5)*.6;pts.push(v);}
  }

  const mn=Math.min(...pts),mx=Math.max(...pts),range=mx-mn||1;
  const col=chg>=0?"#e22b2b":"#1763b2";
  sc.beginPath();
  pts.forEach((p,i)=>{
    const px=i/(pts.length-1)*W,py=H-4-((p-mn)/range)*(H-8);
    i===0?sc.moveTo(px,py):sc.lineTo(px,py);
  });
  sc.strokeStyle=col;sc.lineWidth=1.5;sc.stroke();
  sc.lineTo(W,H-4-((pts[pts.length-1]-mn)/range)*(H-8));
  sc.lineTo(W,H);sc.lineTo(0,H);sc.closePath();
  sc.fillStyle=chg>=0?"rgba(226,43,43,.15)":"rgba(23,99,178,.18)";sc.fill();
}

/* ════════════════════════════════
   INTERACTION
════════════════════════════════ */
const tt=document.getElementById("tt");
function hit(mx,my){for(let i=tiles.length-1;i>=0;i--){const r=tiles[i];if(mx>=r.x&&mx<=r.x+r.w&&my>=r.y&&my<=r.y+r.h)return i;}return -1;}

cv.addEventListener("mousemove",e=>{
  const rc=cv.getBoundingClientRect(),mx=e.clientX-rc.left,my=e.clientY-rc.top;
  const idx=hit(mx,my);
  if(idx!==hovIdx){
    hovIdx=idx;hovProgress=0;
    if(hovRaf)cancelAnimationFrame(hovRaf);
    idx>=0?animHover():draw();
  }
  if(idx>=0){
    const r=tiles[idx];
    const full=SECTORS.flatMap(s=>s.stocks).find(st=>st.c===r.c)?.full??r.n;
    const sign=r.chg>=0?"+":"",cls=r.chg>0.05?"u":r.chg<-0.05?"d":"";
    document.getElementById("tt-tk").textContent=r.n;
    document.getElementById("tt-nm").textContent=full;
    document.getElementById("tt-pr").textContent=r.price?r.price.toLocaleString("ko-KR")+"원":"—";
    const ch=document.getElementById("tt-ch");ch.textContent=sign+r.chg.toFixed(2)+"%";ch.className="tt-rv "+cls;
    const bd=document.getElementById("tt-bd");bd.textContent=sign+r.chg.toFixed(2)+"%";bd.className="tt-badge "+cls;
    document.getElementById("tt-sc").textContent=r.sector;
    drawSparkline(document.getElementById("tt-sp"),r.chg,r.c);
    tt.style.display="block";
    let lx=e.clientX+16,ly=e.clientY-14;
    if(lx+240>innerWidth)lx=e.clientX-248;
    if(ly+220>innerHeight)ly=e.clientY-228;
    tt.style.left=lx+"px";tt.style.top=ly+"px";
  }else{tt.style.display="none";}
});
cv.addEventListener("mouseleave",()=>{tt.style.display="none";hovIdx=-1;hovProgress=0;if(hovRaf)cancelAnimationFrame(hovRaf);draw();});
cv.addEventListener("click",e=>{
  const rc=cv.getBoundingClientRect(),idx=hit(e.clientX-rc.left,e.clientY-rc.top);
  if(idx>=0)window.open(`https://finance.naver.com/item/main.naver?code=${tiles[idx].c}`,"_blank");
});

/* ── 터치 이벤트 (모바일) ── */
function showTip(r){
  const full=SECTORS.flatMap(s=>s.stocks).find(st=>st.c===r.c)?.full??r.n;
  const sign=r.chg>=0?"+":"",cls=r.chg>0.05?"u":r.chg<-0.05?"d":"";
  document.getElementById("tt-tk").textContent=r.n;
  document.getElementById("tt-nm").textContent=full;
  document.getElementById("tt-pr").textContent=r.price?r.price.toLocaleString("ko-KR")+"원":"—";
  const ch=document.getElementById("tt-ch");ch.textContent=sign+r.chg.toFixed(2)+"%";ch.className="tt-rv "+cls;
  const bd=document.getElementById("tt-bd");bd.textContent=sign+r.chg.toFixed(2)+"%";bd.className="tt-badge "+cls;
  document.getElementById("tt-sc").textContent=r.sector;
  drawSparkline(document.getElementById("tt-sp"),r.chg,r.c);
  tt.style.display="block";
}
let _touchTimer=null,_lastIdx=-1;
cv.addEventListener("touchstart",e=>{
  e.preventDefault();
  const t=e.touches[0],rc=cv.getBoundingClientRect();
  const idx=hit(t.clientX-rc.left,t.clientY-rc.top);
  _lastIdx=idx;
  if(idx>=0){hovIdx=idx;hovProgress=1;draw();showTip(tiles[idx]);}
  if(_touchTimer)clearTimeout(_touchTimer);
  _touchTimer=setTimeout(()=>{
    tt.style.display="none";hovIdx=-1;hovProgress=0;draw();
    if(_lastIdx>=0){window.open(`https://finance.naver.com/item/main.naver?code=${tiles[_lastIdx].c}`,"_blank");_lastIdx=-1;}
  },700);
},{passive:false});
cv.addEventListener("touchend",e=>{e.preventDefault();},{passive:false});
cv.addEventListener("touchmove",e=>{
  e.preventDefault();
  tt.style.display="none";hovIdx=-1;hovProgress=0;_lastIdx=-1;
  if(_touchTimer){clearTimeout(_touchTimer);_touchTimer=null;}
  draw();
},{passive:false});

/* ════════════════════════════════
   REFRESH LOOP
════════════════════════════════ */
function tick(){
  const s=Math.max(0,Math.round((nextAt-Date.now())/1000));
  const m=Math.floor(s/60),ss=s%60;
  document.getElementById("nxt").textContent=
    s>0?`다음 갱신 ${m}:${ss.toString().padStart(2,"0")}`:"갱신 중...";
}

let loopTimer=null;
async function loop(){
  if(loopTimer){clearTimeout(loopTimer);loopTimer=null;}
  document.getElementById("lov").style.display="flex";
  document.getElementById("ltxt").textContent="데이터 불러오는 중...";
  document.getElementById("lsub").textContent="Yahoo Finance 연결 시도 중";
  await loadAll();
  document.getElementById("lov").style.display="none";
  draw();
  nextAt=Date.now()+REFRESH;
  loopTimer=setTimeout(loop,REFRESH);
}

// 하단 '갱신' 텍스트 클릭 시 즉시 갱신
document.getElementById("nxt").style.cursor="pointer";
document.getElementById("nxt").title="클릭하여 즉시 갱신";
document.getElementById("nxt").addEventListener("click",()=>loop());

window.addEventListener("resize",draw);
setInterval(tick,1000);
loop();
</script>
